data:
  dist: low_rank_gaussian
  d_in: 32
  n_samples: 4096
  intrinsic_dim: 4
  noise_std: 0.1
  splits: [0.8, 0.1, 0.1]
  standardize: false
  seed: 0

model:
  kind: ae
  d_in: 32
  d_hidden: 4
  d_mid: null
  activation: identity
  beta: 1.0
  recon: mse

train:
  optimizer: adam
  lr: 0.01
  batch_size: 256
  steps: 2000
  seed: 0
  eval_every: 200
  run_dir: runs
